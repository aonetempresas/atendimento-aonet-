            dataLabels: { enabled:true, style:{fontSize:'14px',fontWeight:700,colors:['#fff']},
                          formatter: (val) => Math.round(val) + '%' },
            stroke: { width: 0 },
            plotOptions: {
                pie: {
                    donut: {
                        size:'70%',
                        labels: {
                            show:true,
                            name: { show:true, fontSize:'13px', color:'#94A3B8', fontWeight:600 },
                            value: { show:true, fontSize:'24px', color:'#fff', fontWeight:700, offsetY:8 },
                            total: {
                                show:true, label:'Com retorno', color:'#94A3B8',
                                fontSize:'12px', fontWeight:600,
                                formatter: () => posPct + '%'
                            }
                        }
                    }
                }
            },
            tooltip: { theme:'dark', y:{ formatter: v => `${v} avaliação${v!==1?'ões':''}` } }
        });

        // 7. Tempo Médio por Plano
        const planosTempo = {};
        const idsPorPlano = {};
        data.forEach(d => {
            if (d.plano && d.tempoMinutos != null && d.tempoMinutos > 0) {
                if (!planosTempo[d.plano]) planosTempo[d.plano] = { soma:0, count:0 };
                planosTempo[d.plano].soma += d.tempoMinutos;
                planosTempo[d.plano].count++;
                (idsPorPlano[d.plano] = idsPorPlano[d.plano] || []).push(d);
            }
        });
        const planosArr = Object.entries(planosTempo)
            .map(([p,v]) => [p, Math.round(v.soma / v.count)])
            .sort((a,b) => b[1]-a[1])
            .slice(0, 12);
        const planoKeys = planosArr.map(p => p[0]);
        this.chart('chart-tempo-plano', {
            chart: {
                type:'bar', height:320, toolbar:{show:false}, foreColor:'#94A3B8', background:'transparent',
                events: {
                    dataPointSelection: (e,c,cfg) => self.openModal('plano', planoKeys[cfg.dataPointIndex], idsPorPlano[planoKeys[cfg.dataPointIndex]])
                }
            },
            series: [{ name:'Tempo médio (minutos)', data: planosArr.map(p => p[1]) }],
            xaxis: { categories: planoKeys, labels:{ style:{colors:'#94A3B8',fontSize:'10px'}, rotate:-30 } },
            yaxis: { labels:{ style:{colors:'#94A3B8',fontSize:'11px'}, formatter: v => v + 'min' } },
            plotOptions: { bar:{ columnWidth:'60%', borderRadius:6 } },
            colors: ['#FBBF24'],
            dataLabels: { enabled:false },
            grid: { show: false },
            tooltip: {
                theme:'dark',
                custom: ({dataPointIndex}) => {
                    const k = planoKeys[dataPointIndex]; if (!k) return '';
                    return `<div style="padding:10px;background:#1E293B;border:1px solid #334155;border-radius:8px;">
                        <div style="font-size:11px;color:#94A3B8;margin-bottom:4px;">${k}</div>
                        <div style="font-weight:700;color:#fff;">Tempo médio: ${self.fmtTempo(planosArr[dataPointIndex][1])}</div>
                        <div style="font-size:11px;color:#60A5FA;">Baseado em ${idsPorPlano[k].length} ${idsPorPlano[k].length!==1 ? self.cfg.chamadoPlural : self.cfg.chamadoSingular}</div>
                        <div style="font-size:10px;color:#FBBF24;margin-top:6px;font-style:italic;">👆 Clique para ver lista</div>
                    </div>`;
                }
            }
        });

        // 8. Distribuição por Atendente/Técnico
        const operadores = {};
        const idsPorOperador = {};
        data.forEach(d => {
            if (!d.operador) return;
            operadores[d.operador] = (operadores[d.operador]||0) + 1;
            (idsPorOperador[d.operador] = idsPorOperador[d.operador] || []).push(d);
        });
        const opSorted = Object.entries(operadores).sort((a,b) => b[1]-a[1]);
        const opKeys = opSorted.map(o => o[0]);
        const opTotal = opSorted.reduce((a,b)=>a+b[1], 0);
        this.chart('chart-atendente', {
            chart: {
                type:'donut', height:300, foreColor:'#94A3B8', background:'transparent',
                events: {
                    dataPointSelection: (e,c,cfg) => self.openModal('atendente', opKeys[cfg.dataPointIndex], idsPorOperador[opKeys[cfg.dataPointIndex]])
                }
            },
            series: opSorted.map(o => o[1]),
            labels: opKeys,
            colors: ['#60A5FA','#2DD4BF','#818CF8','#FBBF24','#F472B6','#34D399','#A78BFA','#FB7185'],
            legend: { position:'bottom', fontSize:'11px', fontWeight:600, labels:{colors:'#94A3B8'}, markers:{width:10,height:10,radius:3} },
            dataLabels: { enabled:true, style:{fontSize:'13px',fontWeight:700,colors:['#fff']},
                          formatter: (val) => Math.round(val) + '%' },
            stroke: { width: 0 },
            plotOptions: {
                pie: {
                    donut: {
                        size:'68%',
                        labels: {
                            show:true,
                            name: { show:true, fontSize:'12px', color:'#94A3B8', fontWeight:600 },
                            value: { show:true, fontSize:'22px', color:'#fff', fontWeight:700, offsetY:8 },
                            total: {
                                show:true, label:'Total', color:'#94A3B8',
                                fontSize:'11px', fontWeight:600,
                                formatter: () => opTotal
                            }
                        }
                    }
                }
            },
            tooltip: { theme:'dark', y:{ formatter: v => `${v} ${v!==1 ? self.cfg.chamadoPlural : self.cfg.chamadoSingular}` } }
        });
    }

    /* ─── MODAL ─── */
    openModal(tipo, label, lista) {
        if (!lista || !lista.length) return;
        const titulos = {
            evolucao:  `${this.cfg.chamadoPlural.charAt(0).toUpperCase() + this.cfg.chamadoPlural.slice(1)} do dia ${label}`,
            sla:       `${this.cfg.chamadoPlural.charAt(0).toUpperCase() + this.cfg.chamadoPlural.slice(1)} — ${label}`,
            motivo:    `Motivo: ${label}`,
            cidade:    `Cidade: ${label}`,
            hora:      `Aberturas às ${label}`,
            pos:       `PÓS: ${label}`,
            plano:     `Plano: ${label}`,
            atendente: `${this.cfg.mode === 'suporte' ? 'Técnico' : 'Atendente'}: ${label}`
        };
        document.getElementById('modal-title').innerText = titulos[tipo] || label;
        document.getElementById('modal-subtitle').innerText = `${lista.length} ${lista.length !== 1 ? this.cfg.chamadoPlural : this.cfg.chamadoSingular} encontrado${lista.length !== 1 ? 's' : ''}`;

        const sorted = lista.slice().sort((a,b) => (b.data||0) - (a.data||0));
        this._lastModalList = sorted;
        activeDashboard = this;  // garante que openDetailModal use este dashboard

        const self = this;
        document.getElementById('modal-tbody').innerHTML = sorted.map((d, i) => {
            const slaBadge = d.slaCumprido === 'Dentro do SLA'
                ? '<span class="badge badge-success">Dentro</span>'
                : d.slaCumprido === 'Fora do SLA'
                    ? '<span class="badge badge-danger">Fora</span>'
                    : '<span class="badge badge-warning">—</span>';
            const posBadge = d.pos === 'COM RETORNO'
                ? '<span class="badge badge-success">Com retorno</span>'
                : d.pos === 'SEM RETORNO'
                    ? '<span class="badge badge-danger">Sem retorno</span>'
                    : '<span class="badge badge-warning">—</span>';
            const resolText = (d.resolucao || '—').length > 80 ? (d.resolucao || '').substring(0,80) + '…' : (d.resolucao || '—');
            const nomeEsc = (d.nome || '—').replace(/"/g, '&quot;');
            return `<tr>
                <td>${d.dataStr || '—'}</td>
                <td>${d.protocolo || '—'}</td>
                <td><span class="client-link" onclick="openDetailFromShared(${i})" title="Ver detalhes completos">${nomeEsc}</span></td>
                <td>${d.cidade || '—'}</td>
                <td>${d.processo || '—'}</td>
                <td title="${(d.resolucao || '').replace(/"/g, '&quot;')}" style="max-width:280px;font-size:11px;color:#94A3B8;">${resolText}</td>
                <td>${d.operador || '—'}</td>
                <td>${self.fmtTempo(d.tempoMinutos)}</td>
                <td>${slaBadge}</td>
                <td>${posBadge}</td>
            </tr>`;
        }).join('');

        document.getElementById('modal').classList.add('active');
    }

    closeModal() {
        document.getElementById('modal').classList.remove('active');
    }

    openDetailModal(idx) {
        const d = (this._lastModalList || [])[idx];
        if (!d) return;

        const $ = id => document.getElementById(id);
        $('detail-title').innerText = d.nome || '—';
        $('detail-sub').innerText   = d.cnpj ? `CNPJ: ${d.cnpj}` : '';

        $('detail-data').innerText      = d.dataStr || '—';
        $('detail-protocolo').innerText = d.protocolo || '—';
        $('detail-cidade').innerText    = d.cidade || '—';
        $('detail-plano').innerText     = d.plano || '—';
        $('detail-atendente').innerText = d.operador || '—';
        $('detail-tempo').innerText     = this.fmtTempo(d.tempoMinutos);

        const fillSection = (id, txt) => {
            const el = $(id);
            if (!txt || !txt.trim()) {
                el.classList.add('empty');
                el.innerText = 'Sem conteúdo registrado';
            } else {
                el.classList.remove('empty');
                el.innerText = txt;
            }
        };

        fillSection('detail-processo',  d.processo);
        fillSection('detail-resolucao', d.resolucao);
        fillSection('detail-obs',       d.obs);

        $('detail-modal').classList.add('active');
    }

    closeDetailModal() {
        document.getElementById('detail-modal').classList.remove('active');
    }

    chart(id, opts) {
        const el = this.$(id);
        if (!el) return;
        const chartKey = this.prefix + id;
        if (this.charts[chartKey]) {
            try {
                this.charts[chartKey].updateOptions(opts, false, false, false);
                return;
            } catch (e) {
                this.charts[chartKey].destroy();
            }
        }
        this.charts[chartKey] = new ApexCharts(el, opts);
        this.charts[chartKey].render();
    }

    /* ─── INSIGHTS ─── */
    renderInsights() {
        const data = this.engine.filtered;
        const total = data.length;
        const insights = [];
        const mode = this.cfg.mode;
        const isSuporte = mode === 'suporte';

        if (total === 0) {
            this.$('insights-grid').innerHTML = `
                <div class="insight-card" style="--insight-accent:#94A3B8;grid-column:1/-1;">
                    <p>Sem ${this.cfg.chamadoPlural} no filtro atual para gerar insights.</p>
                </div>`;
            return;
        }

        // ─── INSIGHTS COMUNS ───
        const horas = Array(24).fill(0);
        data.forEach(d => { if (d.abertura) horas[d.abertura.getHours()]++; });
        let maxJanela = 0, inicioJanela = 0;
        for (let h = 0; h <= 21; h++) {
            const soma = horas[h] + horas[h+1] + horas[h+2];
            if (soma > maxJanela) { maxJanela = soma; inicioJanela = h; }
        }
        if (maxJanela > 0) {
            const pctJanela = (maxJanela / total * 100).toFixed(0);
            if (pctJanela >= 35) {
                insights.push({
                    cor: '#FBBF24', icon: '🕐',
                    titulo: 'Concentração em horário de pico',
                    texto: `<strong>${pctJanela}%</strong> dos ${this.cfg.chamadoPlural} abrem entre <strong>${String(inicioJanela).padStart(2,'0')}h e ${String(inicioJanela+3).padStart(2,'0')}h</strong> (${maxJanela} de ${total}).`,
                    acao: '💡 Considerar reforçar o time nesse intervalo ou ajustar a escala.'
                });
            }
        }

        const motivos = {};
        data.forEach(d => { if (d.processo) motivos[d.processo] = (motivos[d.processo]||0) + 1; });
        const topMot = Object.entries(motivos).sort((a,b) => b[1]-a[1])[0];
        if (topMot) {
            const pctMot = (topMot[1] / total * 100).toFixed(0);
            if (pctMot >= 25) {
                insights.push({
                    cor: '#818CF8', icon: '🎯',
                    titulo: isSuporte ? 'Problema técnico dominante' : 'Motivo dominante de chamados',
                    texto: `<strong>"${topMot[0]}"</strong> representa <strong>${pctMot}%</strong> dos ${this.cfg.chamadoPlural} (${topMot[1]} casos).`,
                    acao: isSuporte
                        ? '💡 Investigar causa raiz — pode indicar problema recorrente de infraestrutura, equipamento ou configuração padrão.'
                        : '💡 Avaliar automação/autoatendimento para esse motivo — pode reduzir volume significativo.'
                });
            }
        }

        const cidades = {};
        data.forEach(d => { if (d.cidade) cidades[d.cidade] = (cidades[d.cidade]||0) + 1; });
        const topCid = Object.entries(cidades).sort((a,b) => b[1]-a[1])[0];
        if (topCid) {
            const pctCid = (topCid[1] / total * 100).toFixed(0);
            if (pctCid >= 30) {
                insights.push({
                    cor: '#60A5FA', icon: '📍',
                    titulo: isSuporte ? 'Concentração geográfica de problemas' : 'Concentração geográfica',
                    texto: `<strong>${topCid[0]}</strong> concentra <strong>${pctCid}%</strong> da demanda (${topCid[1]} chamados).`,
                    acao: isSuporte
                        ? '💡 Investigar infraestrutura local — pode indicar problema regional (POP, backbone, cabeamento) que afeta múltiplos clientes.'
                        : '💡 Maior peso operacional nessa região — considerar atendimento dedicado ou priorização.'
                });
            }
        }

        // SLA
        const slaOk = data.filter(d => d.slaCumprido === 'Dentro do SLA').length;
        const slaFora = data.filter(d => d.slaCumprido === 'Fora do SLA').length;
        const slaAval = slaOk + slaFora;
        if (slaAval > 0) {
            const pctSla = (slaOk / slaAval * 100);
            if (pctSla >= 95) {
                insights.push({
                    cor: '#34D399', icon: '✅',
                    titulo: 'SLA em nível de excelência',
                    texto: `<strong>${pctSla.toFixed(1).replace('.',',')}%</strong> dos ${this.cfg.chamadoPlural} avaliados foram resolvidos dentro do prazo contratado.`,
                    acao: '💡 Manter o padrão. Documentar boas práticas pra escalar sem perder qualidade.'
                });
            } else if (pctSla < 85) {
                insights.push({
                    cor: '#F87171', icon: '⚠️',
                    titulo: 'SLA abaixo do esperado',
                    texto: `Apenas <strong>${pctSla.toFixed(1).replace('.',',')}%</strong> cumpriram o SLA. <strong>${slaFora}</strong> ficaram fora do prazo.`,
                    acao: '💡 Revisar fluxos de priorização e escalonamento. Identificar gargalos nos motivos mais frequentes.'
                });
            }
        }

        // PÓS
        const posOk = data.filter(d => d.pos === 'COM RETORNO').length;
        const posNeg = data.filter(d => d.pos === 'SEM RETORNO').length;
        const posAval = posOk + posNeg;
        if (posAval > 0) {
            const pctPos = (posOk / posAval * 100);
            if (posNeg >= 5) {
                insights.push({
                    cor: '#F87171', icon: '🤔',
                    titulo: 'Clientes sem retorno em volume',
                    texto: `<strong>${posNeg}</strong> clientes <strong>sem retorno</strong> — <strong>${(posNeg/posAval*100).toFixed(0)}%</strong> do total avaliado.`,
                    acao: '💡 Considerar fluxo de follow-up: cliente sem retorno pode indicar problema mal resolvido ou desistência.'
                });
            } else if (pctPos >= 90) {
                insights.push({
                    cor: '#34D399', icon: '🔁',
                    titulo: 'Retorno do cliente elevado',
                    texto: `<strong>${pctPos.toFixed(1).replace('.',',')}%</strong> dos clientes retornaram para confirmar resolução.`,
                    acao: '💡 Cliente engajado. Boa oportunidade pra coletar depoimentos e pesquisa de NPS.'
                });
            }
        }

        // Tempo
        const tempos = data.map(d => ({ d, t: d.tempoMinutos })).filter(x => x.t != null && x.t > 0);
        if (tempos.length) {
            const tArr = tempos.map(x => x.t).sort((a,b)=>a-b);
            const mediana = tArr[Math.floor(tArr.length/2)];
            const maxT = tArr[tArr.length-1];
            const criticos = tempos.filter(x => x.t > mediana * 5).length;
            if (criticos > 0 && maxT > 480) {
                insights.push({
                    cor: '#FBBF24', icon: '⏱️',
                    titulo: 'Casos com tempo crítico',
                    texto: `<strong>${criticos}</strong> ${criticos!==1 ? this.cfg.chamadoPlural : this.cfg.chamadoSingular} com tempo muito acima da mediana. Caso mais longo: <strong>${this.fmtTempo(maxT)}</strong>.`,
                    acao: isSuporte
                        ? '💡 Revisar escalonamento de casos críticos. Avaliar se há dependência de terceiros (infraestrutura, fornecedor) travando resolução.'
                        : '💡 Revisar fluxo de escalonamento para casos críticos. Avaliar bloqueios técnicos ou de processo.'
                });
            }
            if (mediana < 120) {
                insights.push({
                    cor: '#34D399', icon: '⚡',
                    titulo: isSuporte ? 'MTTR ágil' : 'Tempo de resolução ágil',
                    texto: `Mediana de <strong>${this.fmtTempo(mediana)}</strong> por ${this.cfg.chamadoSingular} — operação enxuta.`,
                    acao: '💡 Padrão operacional saudável. Documentar processos pra manter ao escalar.'
                });
            }
        }

        // ─── INSIGHTS ESPECÍFICOS DE SUPORTE ───
        if (isSuporte) {
            // Taxa de reabertura crítica
            const reabertos = data.filter(d => /REABERTO/i.test(d.status)).length;
            const comStatus = data.filter(d => d.status).length;
            if (comStatus > 0) {
                const pctReab = (reabertos / comStatus * 100);
                if (pctReab >= 10) {
                    insights.push({
                        cor: '#F87171', icon: '🔄',
                        titulo: 'Taxa de reabertura alta',
                        texto: `<strong>${pctReab.toFixed(1).replace('.',',')}%</strong> dos chamados foram reabertos (${reabertos} de ${comStatus}). Indica qualidade de resolução comprometida.`,
                        acao: '💡 Revisar procedimento de fechamento. Aumentar validação pós-resolução antes de marcar como resolvido.'
                    });
                } else if (reabertos > 0 && pctReab < 3) {
                    insights.push({
                        cor: '#34D399', icon: '🎯',
                        titulo: 'Qualidade de resolução alta',
                        texto: `Apenas <strong>${pctReab.toFixed(1).replace('.',',')}%</strong> de reabertura — chamados resolvidos com qualidade na primeira interação.`,
                        acao: '💡 Ótimo indicador de first-call resolution. Manter procedimentos de validação.'
                    });
                }
            }

            // Reincidência de cliente
            const porCliente = {};
            data.forEach(d => {
                const key = (d.cnpj && d.cnpj.trim()) || (d.nome && d.nome.trim());
                if (!key) return;
                (porCliente[key] = porCliente[key] || []).push(d);
            });
            const clientes = Object.entries(porCliente);
            const reincidentes = clientes.filter(([k, v]) => v.length > 1);
            if (clientes.length > 0 && reincidentes.length >= 3) {
                const pctReinc = (reincidentes.length / clientes.length * 100);
                const cronicos = reincidentes.filter(([k, v]) => v.length >= 3).sort((a,b) => b[1].length - a[1].length);
                let acao = '💡 Investigar padrão desses clientes — pode indicar problema crônico técnico ou de configuração.';
                if (cronicos.length > 0) {
                    const top = cronicos[0];
                    acao = `💡 <strong>${top[1][0].nome || top[0]}</strong> abriu <strong>${top[1].length} chamados</strong> — investigar causa raiz específica desse cliente.`;
                }
                insights.push({
                    cor: '#FBBF24', icon: '🔁',
                    titulo: 'Clientes reincidentes identificados',
                    texto: `<strong>${reincidentes.length}</strong> clientes (<strong>${pctReinc.toFixed(0)}%</strong>) abriram mais de 1 chamado no período. ${cronicos.length > 0 ? `<strong>${cronicos.length}</strong> com 3+ chamados.` : ''}`,
                    acao: acao
                });
            }

            // Cluster técnico de motivo por cidade (problema regional específico)
            if (topMot && topCid) {
                const cruzamento = data.filter(d => d.cidade === topCid[0] && d.processo === topMot[0]).length;
                const pctCruz = topCid[1] > 0 ? (cruzamento / topCid[1] * 100) : 0;
                if (cruzamento >= 5 && pctCruz >= 40) {
                    insights.push({
                        cor: '#F87171', icon: '🌐',
                        titulo: 'Padrão técnico regional detectado',
                        texto: `Em <strong>${topCid[0]}</strong>, <strong>${cruzamento}</strong> chamados (<strong>${pctCruz.toFixed(0)}%</strong> da cidade) são do mesmo tipo: "<strong>${topMot[0]}</strong>".`,
                        acao: '💡 Possível problema de infraestrutura afetando a região. Priorizar inspeção técnica local.'
                    });
                }
            }
        }

        // Campos vazios
        const semSla = data.filter(d => !d.slaCumprido).length;
        const semPos = data.filter(d => !d.pos).length;
        if (semSla > 0 || semPos > 0) {
            const max = Math.max(semSla, semPos);
            const pct = (max / total * 100).toFixed(0);
            if (pct >= 15) {
                insights.push({
                    cor: '#94A3B8', icon: '📝',
                    titulo: 'Campos não preenchidos',
                    texto: `<strong>${semSla}</strong> sem SLA Cumprido, <strong>${semPos}</strong> sem PÓS preenchidos.`,
                    acao: '💡 Reforçar preenchimento com a equipe — dados ausentes distorcem indicadores.'
                });
            }
        }

        if (insights.length === 0) {
            insights.push({
                cor: '#34D399', icon: '✅',
                titulo: 'Operação estável',
                texto: 'Nenhum sinal de alerta nos indicadores principais. Continue monitorando.',
                acao: '💡 Padrão dentro do esperado em todas as dimensões avaliadas.'
            });
        }

        this.$('insights-grid').innerHTML = insights.map(i => `
            <div class="insight-card" style="--insight-accent:${i.cor}">
                <h4>${i.icon} ${i.titulo}</h4>
                <p>${i.texto}</p>
                <div class="insight-action">${i.acao}</div>
            </div>
        `).join('');
    }
}

/* ═════════════════════════════════════════════════════════════════════════
   INICIALIZAÇÃO — monta as duas views e configura roteamento
   ═════════════════════════════════════════════════════════════════════════ */

// 1) Popula o HTML das duas views
document.getElementById('view-atendimento').innerHTML = buildViewHTML(VIEW_CONFIGS.atendimento);
document.getElementById('view-suporte').innerHTML     = buildViewHTML(VIEW_CONFIGS.suporte);

// 2) Cria as instâncias (expostas globalmente pra os onclicks funcionarem)
const dashA = new Dashboard(VIEW_CONFIGS.atendimento);
const dashS = new Dashboard(VIEW_CONFIGS.suporte);

// 3) Referência ao dashboard ativo
let activeDashboard = dashA;

// 4) Funções globais para os onclicks do header e modais compartilhados
function syncActive() { activeDashboard.syncAndRender(); }
function closeSharedModal() { activeDashboard.closeModal(); }
function closeSharedDetailModal() { activeDashboard.closeDetailModal(); }
function openDetailFromShared(idx) { activeDashboard.openDetailModal(idx); }

function toggleFullscreen() {
    const elem = document.documentElement;
    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
    if (!isFs) {
        if (elem.requestFullscreen)        elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        else if (elem.msRequestFullscreen)     elem.msRequestFullscreen();
    } else {
        if (document.exitFullscreen)        document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.msExitFullscreen)     document.msExitFullscreen();
    }
}

function updateFullscreenButton() {
    const btn = document.querySelector('.btn-fullscreen');
    if (!btn) return;
    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
    btn.innerHTML = isFs ? '✕ &nbsp;Sair Tela Cheia' : '⛶ &nbsp;Tela Cheia';
}
document.addEventListener('fullscreenchange',       updateFullscreenButton);
document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
document.addEventListener('msfullscreenchange',     updateFullscreenButton);

// 5) Troca de view
function activateView(mode, skipHash) {
    const target = mode === 'suporte' ? dashS : dashA;
    if (activeDashboard === target && target._initialFilterApplied) {
        // Já está ativo e já foi carregado, só garante que a UI está visível
    }
    activeDashboard = target;

    // Marca visual
    document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.view === mode);
    });
    document.getElementById('view-atendimento').classList.toggle('active', mode === 'atendimento');
    document.getElementById('view-suporte').classList.toggle('active', mode === 'suporte');

    // Título e cor de fundo
    document.getElementById('header-title').innerText = target.cfg.headerTitle;
    document.body.classList.toggle('view-suporte-active', mode === 'suporte');

    // Hash na URL pra bookmark
    if (!skipHash) {
        history.replaceState(null, '', '#' + mode);
    }

    // Atualiza badge do mês pra refletir os filtros dessa view
    target.updateMonthIndicator();

    // Carrega se ainda não carregou; senão só re-renderiza (evita fetch redundante)
    if (!target._initialFilterApplied) {
        target.syncAndRender();
    } else {
        target.renderAll();
    }
}

// 6) Init — respeita o hash (#suporte abre direto na view de suporte)
function initFromHash() {
    const hash = (location.hash || '').replace('#', '').toLowerCase();
    if (hash === 'suporte') {
        activateView('suporte', true);
    } else {
        activateView('atendimento', true);
    }
    activeDashboard.syncAndRender();
}

window.addEventListener('hashchange', () => {
    const hash = (location.hash || '').replace('#', '').toLowerCase();
    if (hash === 'suporte' || hash === 'atendimento') {
        activateView(hash, true);
    }
});

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initFromHash);
} else {
    initFromHash();
}

// 7) Auto-refresh — só atualiza a view ativa e apenas quando aba visível
setInterval(() => {
    if (document.visibilityState === 'visible') activeDashboard.syncAndRender();
}, 5 * 60 * 1000);
</script>
