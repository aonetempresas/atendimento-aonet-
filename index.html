<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Aonet Corporativo — Atendimento & Suporte</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://docs.google.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts" defer></script>
    <style>
        :root {
            --bg-deep: #0F172A;
            --bg-card: rgba(15, 23, 42, 0.6);
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(148, 163, 184, 0.15);
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --primary: #60A5FA;
            --teal: #2DD4BF;
            --success: #34D399;
            --warning: #FBBF24;
            --danger: #F87171;
            --purple: #818CF8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 20% 50%, rgba(96,165,250,0.08) 0%, transparent 50%),
                              radial-gradient(circle at 80% 80%, rgba(45,212,191,0.05) 0%, transparent 50%);
        }
        /* Cor de fundo da view Suporte fica ligeiramente diferente pra sinalizar contexto */
        body.view-suporte-active {
            background-image: radial-gradient(circle at 20% 50%, rgba(248,113,113,0.08) 0%, transparent 50%),
                              radial-gradient(circle at 80% 80%, rgba(251,191,36,0.05) 0%, transparent 50%);
        }

        /* ─── HEADER ─── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            background: rgba(15, 23, 42, 0.85);
            border-bottom: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 16px;
        }
        .header-brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
        .header-logo {
            height: 130px;
            width: auto;
            max-width: 320px;
            object-fit: contain;
            flex-shrink: 0;
            display: block;
            margin: -32px -14px -32px -12px;
        }
        .header-brand h1 {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.4px;
            color: var(--text-main);
        }
        .month-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 8px;
            background: rgba(96, 165, 250, 0.12);
            border: 1px solid rgba(96, 165, 250, 0.28);
            color: #93C5FD;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }
        body.view-suporte-active .month-indicator {
            background: rgba(248, 113, 113, 0.10);
            border-color: rgba(248, 113, 113, 0.28);
            color: #FCA5A5;
        }
        .header-sub {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }
        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ─── TAB NAV (Atendimento / Suporte) ─── */
        .tab-nav {
            display: flex;
            gap: 4px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 4px;
            flex-shrink: 0;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.18s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .tab-btn:hover { color: var(--text-main); background: rgba(148, 163, 184, 0.08); }
        .tab-btn[data-view="atendimento"].active {
            background: rgba(96, 165, 250, 0.18);
            color: var(--primary);
            box-shadow: 0 0 12px rgba(96, 165, 250, 0.2);
        }
        .tab-btn[data-view="suporte"].active {
            background: rgba(248, 113, 113, 0.18);
            color: var(--danger);
            box-shadow: 0 0 12px rgba(248, 113, 113, 0.2);
        }

        .header-right { display: flex; gap: 10px; align-items: center; }
        .btn-sync, .btn-fullscreen {
            border-radius: 10px;
            padding: 9px 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-sync {
            background: rgba(96,165,250,0.1);
            color: var(--primary);
            border: 1px solid rgba(96,165,250,0.3);
        }
        .btn-sync:hover {
            background: rgba(96,165,250,0.2);
            transform: translateY(-1px);
        }
        .btn-fullscreen {
            background: rgba(148,163,184,0.1);
            color: var(--text-muted);
            border: 1px solid rgba(148,163,184,0.25);
        }
        .btn-fullscreen:hover {
            background: rgba(148,163,184,0.2);
            color: var(--text-main);
            transform: translateY(-1px);
        }

        /* ─── VIEW SWITCHER ─── */
        .view { display: none; }
        .view.active { display: block; }

        /* ─── MAIN ─── */
        .main { padding: 24px; max-width: 1920px; margin: 0 auto; }

        /* ─── PULSO OPERACIONAL ─── */
        .main-pulse-row {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 10px;
        }
        .main-pulse-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 14px 16px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 90px;
        }
        .main-pulse-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 3px;
            background: var(--pulse-accent, var(--text-muted));
        }
        .main-pulse-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            line-height: 1.2;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .main-pulse-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.15;
            letter-spacing: -0.5px;
            font-variant-numeric: tabular-nums;
        }
        .main-pulse-status {
            font-size: 11px;
            font-weight: 700;
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .main-pulse-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            line-height: 1.3;
        }
        .main-pulse-legend {
            display: flex;
            justify-content: flex-end;
            gap: 18px;
            margin: -2px 0 18px 0;
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .main-pulse-legend span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        /* ─── KPI STRIP ─── */
        .kpi-strip {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 24px;
            width: 100%;
        }
        .kpi-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 18px 16px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100px;
        }
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--kpi-accent, var(--primary));
        }
        .kpi-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }
        .kpi-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.3px;
            line-height: 1.15;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }
        .kpi-sub {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            line-height: 1.3;
            margin-top: auto;
            padding-top: 6px;
        }

        /* ─── FILTER BAR ─── */
        .filter-bar {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 24px;
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1 1 0;
            min-width: 0;
        }
        .filter-item label {
            font-size: 9.5px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .filter-item input, .filter-item select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 5px 6px;
            color: var(--text-main);
            font-size: 11.5px;
            font-family: 'Inter', sans-serif;
            outline: none;
            width: 100%;
            min-width: 0;
            text-overflow: ellipsis;
        }
        .filter-item input[type="date"] { min-width: 110px; }
        .filter-clear {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 10.5px;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
            padding: 5px 8px;
        }
        .filter-clear:hover { color: #FCA5A5; }

        .btn-month-nav {
            background: rgba(96, 165, 250, 0.08);
            border: 1px solid rgba(96, 165, 250, 0.25);
            color: #93C5FD;
            font-size: 10.5px;
            font-weight: 600;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-month-nav:hover {
            background: rgba(96, 165, 250, 0.18);
            border-color: rgba(96, 165, 250, 0.5);
        }
        body.view-suporte-active .btn-month-nav {
            background: rgba(248, 113, 113, 0.08);
            border-color: rgba(248, 113, 113, 0.25);
            color: #FCA5A5;
        }
        body.view-suporte-active .btn-month-nav:hover {
            background: rgba(248, 113, 113, 0.18);
            border-color: rgba(248, 113, 113, 0.5);
        }

        /* ─── CHARTS ─── */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .chart-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 18px 20px;
            backdrop-filter: blur(10px);
            transition: border-color 0.2s;
        }
        .chart-card:hover { border-color: rgba(96,165,250,0.25); }
        .chart-card.span4 { grid-column: span 4; }
        .chart-card.span6 { grid-column: span 6; }
        .chart-card.span8 { grid-column: span 8; }
        .chart-card.span12 { grid-column: span 12; }
        .chart-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chart-tag {
            font-size: 9px;
            font-weight: 700;
            background: rgba(96,165,250,0.15);
            color: var(--primary);
            padding: 3px 8px;
            border-radius: 5px;
            text-transform: uppercase;
        }

        /* ─── TABLE (nos modais) ─── */
        .badge {
            display: inline-block;
            padding: 3px 9px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .badge-success { background: rgba(52,211,153,0.15); color: var(--success); }
        .badge-danger  { background: rgba(248,113,113,0.15); color: var(--danger); }
        .badge-warning { background: rgba(251,191,36,0.15); color: var(--warning); }

        /* ─── SCROLL HORIZONTAL pra gráficos com muitos items ─── */
        .chart-scroll-container {
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 8px;
        }
        .chart-scroll-container::-webkit-scrollbar { height: 8px; }
        .chart-scroll-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); border-radius: 10px; }
        .chart-scroll-container::-webkit-scrollbar-thumb { background: rgba(96,165,250,0.4); border-radius: 10px; }
        .chart-scroll-container::-webkit-scrollbar-thumb:hover { background: rgba(96,165,250,0.6); }
        .chart-inner { min-width: 100%; }

        /* ─── MODAL ─── */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-deep);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            max-width: 1200px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 24px 60px rgba(0,0,0,0.6);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--card-border);
        }
        .modal-header h2 {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 4px 0;
            color: var(--text-main);
        }
        .modal-header p {
            font-size: 12px;
            color: var(--text-muted);
            margin: 0;
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 22px;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            transition: color 0.2s;
        }
        .modal-close:hover { color: var(--danger); }
        .modal-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .modal-table th {
            text-align: left;
            padding: 9px 8px;
            border-bottom: 1px solid var(--card-border);
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(15,23,42,0.6);
            position: sticky;
            top: 0;
        }
        .modal-table td {
            padding: 9px 8px;
            border-bottom: 1px solid rgba(148,163,184,0.06);
            color: var(--text-main);
        }
        .modal-table tr:hover td { background: rgba(96,165,250,0.04); }

        .client-link {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px dashed rgba(96,165,250,0.4);
            transition: color 0.15s;
        }
        .client-link:hover { color: var(--teal); border-bottom-color: var(--teal); }

        /* ─── SUB-MODAL (detalhes) ─── */
        .detail-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1100;
            padding: 20px;
        }
        .detail-modal.active { display: flex; }
        .detail-modal-content {
            background: var(--bg-deep);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 28px 32px;
            max-width: 720px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 24px 60px rgba(0,0,0,0.7);
        }
        .detail-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--card-border);
        }
        .detail-modal-header h3 {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 4px 0;
            line-height: 1.3;
        }
        .detail-modal-header .sub {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .detail-section { margin-bottom: 18px; }
        .detail-section:last-child { margin-bottom: 0; }
        .detail-section-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .detail-section-content {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-main);
            background: rgba(15,23,42,0.5);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 12px 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .detail-section-content.empty {
            color: var(--text-muted);
            font-style: italic;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .detail-mini {
            background: rgba(15,23,42,0.5);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 10px 12px;
        }
        .detail-mini-label {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 3px;
        }
        .detail-mini-value {
            font-size: 13px;
            color: var(--text-main);
            font-weight: 600;
        }

        /* ─── INSIGHTS 360 ─── */
        .insights-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 22px 24px;
            backdrop-filter: blur(10px);
            margin-bottom: 24px;
        }
        .insights-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .insights-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 18px;
        }
        .insights-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }
        .insight-card {
            background: rgba(15,23,42,0.4);
            border: 1px solid var(--card-border);
            border-left: 3px solid var(--insight-accent, var(--primary));
            border-radius: 10px;
            padding: 14px 16px;
        }
        .insight-card h4 {
            font-size: 12px;
            font-weight: 700;
            color: var(--insight-accent, var(--primary));
            margin: 0 0 6px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .insight-card p {
            font-size: 13px;
            line-height: 1.55;
            color: var(--text-main);
            margin: 0;
        }
        .insight-card .insight-action {
            margin-top: 8px;
            font-size: 11px;
            color: var(--text-muted);
            font-style: italic;
            line-height: 1.4;
        }
        @media (max-width: 900px) {
            .insights-grid { grid-template-columns: 1fr; }
        }

        /* ─── LOADER ─── */
        .loader {
            position: fixed;
            inset: 0;
            background: var(--bg-deep);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.3s;
        }
        .loader.hidden { opacity: 0; pointer-events: none; }
        .loader-logo {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            animation: pulse 1.5s infinite;
        }

        @media (max-width: 1400px) {
            .kpi-strip { grid-template-columns: repeat(4, minmax(0, 1fr)); }
            .main-pulse-row { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }
        @media (max-width: 1100px) {
            .kpi-strip { grid-template-columns: repeat(3, minmax(0, 1fr)); }
            .main-pulse-row { grid-template-columns: repeat(2, 1fr); }
            .chart-card.span4, .chart-card.span6, .chart-card.span8 { grid-column: span 12; }
            .header { flex-wrap: wrap; }
        }
        @media (max-width: 768px) {
            .main { padding: 16px; }
            .kpi-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }

const CSV_URL_ATENDIMENTO = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTCJxNaFnzfvWMtMABfxpHoo7bL4XtuHia5ZVNWIt3NsQjGtFsZUhAhKZBGeV_fbxSJrAh2A5OdroYZ/pub?output=csv";

/* ═════════════════════════════════════════════════════════════════════════
   ENGINE — Feriados (compartilhado entre as duas views)
   ═════════════════════════════════════════════════════════════════════════ */
class HolidaysEngine {
    constructor(url) {
        this.url = url;
        this.set = new Set();
    }
    async fetch() {
        try {
            const res = await fetch(this.url);
            if (!res.ok) return;
            const csv = await res.text();
            this.parse(csv);
        } catch (e) { console.warn("Feriados:", e); }
    }
    parse(csv) {
        this.set.clear();
        for (const line of csv.split('\n')) {
            const m = line.match(/^["\s]*(\d{2}\/\d{2}\/\d{4})/);
            if (m) this.set.add(m[1]);
        }
    }
    isHoliday(d) {
        if (!d) return false;
        const key = d instanceof Date
            ? `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`
            : String(d).trim();
        return this.set.has(key);
    }
    isBusinessDay(date) {
        const dow = date.getDay();
        if (dow === 0 || dow === 6) return false;
        return !this.isHoliday(date);
    }
    countBusinessDays(ini, fim) {
        let count = 0;
        const cur = new Date(ini); cur.setHours(0,0,0,0);
        const end = new Date(fim); end.setHours(0,0,0,0);
        while (cur <= end) {
            if (this.isBusinessDay(cur)) count++;
            cur.setDate(cur.getDate() + 1);
        }
        return count;
    }
}
const holidaysEngine = new HolidaysEngine(CSV_URL_FERIADOS);
let feriadosLoaded = false;

/* ═════════════════════════════════════════════════════════════════════════
   ENGINE — Chamados (usado por Atendimento E Suporte, colunas iguais)
   ═════════════════════════════════════════════════════════════════════════ */
class AtendimentoEngine {
    constructor(url) {
        this.url = url;
        this.data = [];
        this.filtered = [];
        this.filters = { dateStart:'', dateEnd:'', cidade:'', processo:'', plano:'', operador:'', status:'' };
    }

    splitLine(line) {
        const result = []; let cur = ''; let inQ = false;
        for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') { inQ = !inQ; continue; }
            if (c === ',' && !inQ) { result.push(cur); cur = ''; continue; }
            cur += c;
        }
        result.push(cur);
        return result.map(s => s.trim());
    }

    parseDate(s) {
        if (!s) return null;
        const m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})(?:\s+(\d{2}):(\d{2})(?::(\d{2}))?)?/);
        if (!m) return null;
        return new Date(+m[3], +m[2]-1, +m[1], +(m[4]||0), +(m[5]||0), +(m[6]||0));
    }

    parseSlaContratado(s) {
        if (!s) return 0;
        const m = s.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
        if (!m) return 0;
        return +m[1] * 60 + +m[2] + (+m[3]||0)/60;
    }

    async sync() {
        try {
            const res = await fetch(this.url);
            if (!res.ok) throw new Error('Falha ao carregar CSV');
            const csv = await res.text();
            this.parse(csv);
            this.applyFilters();
            return true;
        } catch(e) {
            console.error('Sync falhou para', this.url, ':', e);
            return false;
        }
    }

    splitCsvLines(csv) {
        const linhas = [];
        let cur = '';
        let inQ = false;
        for (let i = 0; i < csv.length; i++) {
            const c = csv[i];
            if (c === '"') {
                if (csv[i+1] === '"') { cur += '""'; i++; continue; }
                inQ = !inQ;
                cur += c;
                continue;
            }
            if ((c === '\n' || c === '\r') && !inQ) {
                if (c === '\r' && csv[i+1] === '\n') i++;
                if (cur.length > 0) linhas.push(cur);
                cur = '';
                continue;
            }
            cur += c;
        }
        if (cur.length > 0) linhas.push(cur);
        return linhas;
    }

    parse(csv) {
        const lines = this.splitCsvLines(csv);
        if (lines.length < 2) { this.data = []; return; }

        let headerIdx = -1;
        for (let i = 0; i < Math.min(lines.length, 15); i++) {
            const lineUpper = lines[i].toUpperCase();
            if (/\bDATA\b/.test(lineUpper) && /\bPROTOCOLO\b/.test(lineUpper) && /\bCIDADE\b/.test(lineUpper)) {
                headerIdx = i;
                break;
            }
        }
        if (headerIdx === -1) headerIdx = 0;
        const header = this.splitLine(lines[headerIdx]).map(h => h.trim().toUpperCase());

        const find = (keys) => {
            for (const k of keys) {
                const idx = header.findIndex(h => h === k);
                if (idx >= 0) return idx;
            }
            for (const k of keys) {
                const idx = header.findIndex(h => h.includes(k));
                if (idx >= 0) return idx;
            }
            return -1;
        };

        const idx = {
            data:        find(['DATA']),
            protocolo:   find(['PROTOCOLO']),
            operador:    find(['ATENDENTE', 'OPERADOR', 'TÉCNICO', 'TECNICO']),
            canal:       find(['CANAL']),
            nome:        find(['NOME/RESPONSÁVEL', 'NOME/RESPONSAVEL', 'NOME', 'RESPONSAVEL']),
            cnpj:        find(['CNPJ']),
            cidade:      find(['CIDADE']),
            plano:       find(['PLANO']),
            sla:         find(['SLA CONTRATADO', 'SLA']),
            abertura:    find(['ABERTURA']),
            fechamento:  find(['FECHAMENTO']),
            tempo:       find(['★ TEMPO ATEND.', 'TEMPO ATEND', 'TEMPO']),
            telefone:    find(['TELEFONE']),
            processo:    find(['PROCESSO']),
            resolucao:   find(['RESOLUÇÃO', 'RESOLUCAO']),
            status:      find(['STATUS']),
            pos:         find(['PÓS ATENDIMENTO', 'POS ATENDIMENTO', 'PÓS', 'POS']),
            slaCumprido: find(['★ SLA CUMPRIDO', 'SLA CUMPRIDO']),
            obs:         find(['OBSERVAÇÃO', 'OBSERVACAO', 'OBSERVA'])
        };

        if (idx.sla !== -1 && idx.sla === idx.slaCumprido) {
            for (let i = 0; i < header.length; i++) {
                if (header[i].includes('SLA') && !header[i].includes('CUMPR')) {
                    idx.sla = i; break;
                }
            }
        }

        const rawRows = lines.slice(headerIdx + 1).map(line => {
            const v = this.splitLine(line);
            if (v.length < 5 || !v[idx.protocolo] || !v[idx.protocolo].trim()) return null;
            const protoStr = (v[idx.protocolo]||'').trim();
            if (!/^\d+/.test(protoStr)) return null;

            const abert = this.parseDate(v[idx.abertura]);
            const fech  = this.parseDate(v[idx.fechamento]);
            const data  = this.parseDate(v[idx.data]);
            const tempoMinutos = (abert && fech) ? Math.max(0, (fech - abert) / 60000) : null;
            const slaContratadoMin = this.parseSlaContratado(v[idx.sla]);

            return {
                data:       data,
                dataStr:    v[idx.data],
                protocolo:  v[idx.protocolo],
                operador:   (v[idx.operador]||'').toUpperCase().trim(),
                canal:      (v[idx.canal]||'').toUpperCase().trim(),
                nome:       v[idx.nome],
                cnpj:       v[idx.cnpj],
                cidade:     (v[idx.cidade]||'').toUpperCase().trim(),
                plano:      (v[idx.plano]||'').toUpperCase().trim(),
                slaContratadoMin: slaContratadoMin,
                abertura:   abert,
                fechamento: fech,
                telefone:   v[idx.telefone],
                processo:   this.normalizeProcesso(v[idx.processo]),
                resolucao:  v[idx.resolucao],
                status:     (v[idx.status]||'').trim(),
                pos:        (v[idx.pos]||'').toUpperCase().trim(),
                slaCumprido: (v[idx.slaCumprido]||'').trim(),
                obs:        v[idx.obs] || '',
                tempoMinutos: tempoMinutos
            };
        }).filter(x => x && x.protocolo);

        this.data = rawRows;
    }

    normalizeProcesso(s) {
        if (!s) return '';
        let p = s.toUpperCase().trim().replace(/\s+/g, ' ');
        p = p.replace(/^DUVIDA SOBRE O BOLETO$/, 'DUVIDA SOBRE BOLETO');
        return p;
    }

    applyFilters() {
        const { dateStart, dateEnd, cidade, processo, plano, operador, status } = this.filters;
        const sd = dateStart ? new Date(dateStart+'T00:00:00') : null;
        const ed = dateEnd   ? new Date(dateEnd  +'T23:59:59') : null;

        this.filtered = this.data.filter(d => {
            if (sd && d.data && d.data < sd) return false;
            if (ed && d.data && d.data > ed) return false;
            if (cidade   && d.cidade !== cidade) return false;
            if (processo && d.processo !== processo) return false;
            if (plano    && d.plano !== plano) return false;
            if (operador && d.operador !== operador) return false;
            if (status   && d.status !== status) return false;
            return true;
        });
    }
}

                <div class="filter-item"><label>Status</label><select id="${p}filter-status" onchange="${inst}.applyFilter()"></select></div>
                <button class="btn-month-nav" onclick="${inst}.navigateMonth(-1)" title="Mês anterior">◀ Mês Anterior</button>
                <button class="btn-month-nav" onclick="${inst}.navigateMonth(1)" title="Próximo mês">Próximo Mês ▶</button>
                <button class="filter-clear" onclick="${inst}.clearFilters()">✕ Limpar Filtros</button>
            </div>

            <!-- Gráficos -->
            <div class="chart-grid">
                <div class="chart-card span8">
                    <div class="chart-title">${cfg.chartTitles.evolucao}<span class="chart-tag">LINE</span></div>
                    <div id="${p}chart-evolucao"></div>
                </div>
                <div class="chart-card span4">
                    <div class="chart-title">SLA Cumprido vs Não Cumprido<span class="chart-tag">DONUT</span></div>
                    <div id="${p}chart-sla"></div>
                </div>

                <div class="chart-card span6">
                    <div class="chart-title">${cfg.chartTitles.motivos}<span class="chart-tag">BAR · SCROLL</span></div>
                    <div class="chart-scroll-container"><div id="${p}chart-motivos" class="chart-inner"></div></div>
                </div>
                <div class="chart-card span6">
                    <div class="chart-title">Top Cidades<span class="chart-tag">BAR · SCROLL</span></div>
                    <div class="chart-scroll-container"><div id="${p}chart-cidades" class="chart-inner"></div></div>
                </div>

                <div class="chart-card span12">
                    <div class="chart-title">Distribuição por Hora do Dia<span class="chart-tag">AREA</span></div>
                    <div id="${p}chart-horas"></div>
                </div>

                <div class="chart-card span4">
                    <div class="chart-title">Retorno do Cliente (PÓS)<span class="chart-tag">DONUT</span></div>
                    <div id="${p}chart-pos"></div>
                </div>
                <div class="chart-card span4">
                    <div class="chart-title">${cfg.chartTitles.atendente}<span class="chart-tag">DONUT</span></div>
                    <div id="${p}chart-atendente"></div>
                </div>
                <div class="chart-card span4">
                    <div class="chart-title">Tempo Médio por Plano<span class="chart-tag">BAR</span></div>
                    <div id="${p}chart-tempo-plano"></div>
                </div>
            </div>

            <!-- Insights 360 -->
            <div class="insights-section">
                <div class="insights-title">${cfg.insightsTitle}</div>
                <div class="insights-subtitle">Análises automáticas baseadas nos dados atuais — atualizadas a cada sincronização</div>
                <div class="insights-grid" id="${p}insights-grid"></div>
            </div>
        </div>
    `;
}

/* ═════════════════════════════════════════════════════════════════════════
   DASHBOARD — classe que encapsula toda a lógica de uma view
   ═════════════════════════════════════════════════════════════════════════ */
class Dashboard {
    constructor(cfg) {
        this.cfg = cfg;
        this.prefix = cfg.prefix;
        this.engine = new AtendimentoEngine(cfg.csvUrl);
        this.charts = {};
        this._initialFilterApplied = false;
        this._appliedMonthKey = null;
        this._lastModalList = null;
    }

    $(id) { return document.getElementById(this.prefix + id); }

    fmt(v) { return v.toLocaleString('pt-BR', { style:'currency', currency:'BRL' }); }
    fmtTempo(minutos) {
        if (!minutos || minutos <= 0) return '0min';
        if (minutos < 60) return Math.round(minutos) + 'min';
        const h = Math.floor(minutos / 60);
        const m = Math.round(minutos % 60);
        return m === 0 ? `${h}h` : `${h}h${m.toString().padStart(2,'0')}`;
    }

    async syncAndRender() {
        document.getElementById('loader').classList.remove('hidden');
        document.getElementById('loader').style.display = 'flex';

        // Feriados carrega uma única vez, compartilhado entre as views
        if (!feriadosLoaded) {
            await holidaysEngine.fetch().catch(()=>{});
            feriadosLoaded = true;
        }

        const ok = await this.engine.sync();
        document.getElementById('update-time').innerText = ok
            ? `Atualizado: ${new Date().toLocaleTimeString('pt-BR').slice(0,8)}`
            : 'Erro ao sincronizar';

        this.populateFilters();

        const hojeYM = this._currentMonthKey();
        if (!this._initialFilterApplied) {
            this.setDefaultMonthFilter();
            this._appliedMonthKey = hojeYM;
            this._initialFilterApplied = true;
        } else if (this._appliedMonthKey && this._appliedMonthKey !== hojeYM
                   && this._filterIsDefault(this._appliedMonthKey)) {
            console.info(`[Auto] Virada de mês: ${this._appliedMonthKey} → ${hojeYM}`);
            this.setDefaultMonthFilter();
            this._appliedMonthKey = hojeYM;
        }

        this.updateMonthIndicator();
        this.renderAll();

        document.getElementById('loader').classList.add('hidden');
        setTimeout(() => document.getElementById('loader').style.display = 'none', 300);
    }

    _currentMonthKey() {
        const h = new Date();
        return `${h.getFullYear()}-${String(h.getMonth()+1).padStart(2,'0')}`;
    }

    _filterIsDefault(monthKey) {
        const [y, m] = monthKey.split('-').map(Number);
        const primeiro = `${y}-${String(m).padStart(2,'0')}-01`;
        const ultimoDia = new Date(y, m, 0).getDate();
        const ultimo = `${y}-${String(m).padStart(2,'0')}-${String(ultimoDia).padStart(2,'0')}`;
        return this.engine.filters.dateStart === primeiro && this.engine.filters.dateEnd === ultimo;
    }

    setDefaultMonthFilter() {
        const hoje = new Date();
        const ano = hoje.getFullYear();
        const mes = hoje.getMonth();
        const primeiroDia = new Date(ano, mes, 1);
        const ultimoDia   = new Date(ano, mes + 1, 0);
        const toYMD = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

        const dateStart = toYMD(primeiroDia);
        const dateEnd   = toYMD(ultimoDia);

        this.$('filter-start').value = dateStart;
        this.$('filter-end').value   = dateEnd;

        this.engine.filters.dateStart = dateStart;
        this.engine.filters.dateEnd   = dateEnd;
        this.engine.applyFilters();
        this.updateFilterInfo();
    }

    updateMonthIndicator() {
        const bar   = document.getElementById('month-indicator');
        const label = document.getElementById('month-indicator-text');
        if (!bar || !label) return;

        const ini = this.engine.filters.dateStart;
        const fim = this.engine.filters.dateEnd;
        const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

        if (!ini && !fim) {
            label.innerText = 'Todos os períodos';
            bar.style.display = 'inline-flex';
            return;
        }
        if (ini && fim) {
            const [yA,mA,dA] = ini.split('-').map(Number);
            const [yB,mB,dB] = fim.split('-').map(Number);
            const ultimoDoMesFim = new Date(yB, mB, 0).getDate();
            if (yA === yB && mA === mB && dA === 1 && dB === ultimoDoMesFim) {
                label.innerText = `${meses[mA-1]}/${yA}`;
                bar.style.display = 'inline-flex';
                return;
            }
        }
        const fmt = s => s ? s.split('-').reverse().join('/') : '...';
        label.innerText = `${fmt(ini)} → ${fmt(fim)}`;
        bar.style.display = 'inline-flex';
    }

    navigateMonth(direction) {
        const iniStr = this.engine.filters.dateStart || this.$('filter-start').value;
        let baseAno, baseMes;
        if (iniStr) {
            const [y, m] = iniStr.split('-').map(Number);
            baseAno = y; baseMes = m - 1;
        } else {
            const hoje = new Date();
            baseAno = hoje.getFullYear();
            baseMes = hoje.getMonth();
        }
        const novaData = new Date(baseAno, baseMes + direction, 1);
        const ano = novaData.getFullYear();
        const mes = novaData.getMonth();
        const primeiroDia = new Date(ano, mes, 1);
        const ultimoDia   = new Date(ano, mes + 1, 0);
        const toYMD = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

        this.$('filter-start').value = toYMD(primeiroDia);
        this.$('filter-end').value   = toYMD(ultimoDia);

        this.engine.filters.dateStart = toYMD(primeiroDia);
        this.engine.filters.dateEnd   = toYMD(ultimoDia);
        this.engine.applyFilters();
        this.updateFilterInfo();
        this.updateMonthIndicator();
        this.renderAll();
    }

    populateFilters() {
        const cidades  = [...new Set(this.engine.data.map(d => d.cidade).filter(Boolean))].sort();
        const procs    = [...new Set(this.engine.data.map(d => d.processo).filter(Boolean))].sort();
        const planos   = [...new Set(this.engine.data.map(d => d.plano).filter(Boolean))].sort();
        const operadores = [...new Set(this.engine.data.map(d => d.operador).filter(Boolean))].sort();
        const statusList = [...new Set(this.engine.data.map(d => d.status).filter(Boolean))].sort();

        const fill = (id, items) => {
            const el = this.$(id);
            if (!el) return;
            const cur = el.value;
            el.innerHTML = '<option value="">Todos</option>' + items.map(x => `<option value="${x}">${x}</option>`).join('');
            el.value = cur;
        };
        fill('filter-cidade', cidades);
        fill('filter-processo', procs);
        fill('filter-plano', planos);
        fill('filter-operador', operadores);
        fill('filter-status', statusList);
    }

    applyFilter() {
        if (this._filterTimer) clearTimeout(this._filterTimer);
        this._filterTimer = setTimeout(() => {
            this.engine.filters.dateStart = this.$('filter-start').value;
            this.engine.filters.dateEnd   = this.$('filter-end').value;
            this.engine.filters.cidade    = this.$('filter-cidade').value;
            this.engine.filters.processo  = this.$('filter-processo').value;
            this.engine.filters.plano     = this.$('filter-plano').value;
            this.engine.filters.operador  = this.$('filter-operador').value;
            this.engine.filters.status    = this.$('filter-status').value;
            this.engine.applyFilters();
            this.updateFilterInfo();
            this.updateMonthIndicator();
            this.renderAll();
        }, 100);
    }

    updateFilterInfo() {
        const f = this.engine.filters;
        const partes = [];
        if (f.dateStart || f.dateEnd) {
            const ini = f.dateStart ? f.dateStart.split('-').reverse().join('/') : '...';
            const fim = f.dateEnd   ? f.dateEnd.split('-').reverse().join('/')   : '...';
            partes.push(`Período: ${ini} → ${fim}`);
        }
        if (f.cidade)   partes.push(`Cidade: ${f.cidade}`);
        if (f.processo) partes.push(`Processo: ${f.processo}`);
        if (f.plano)    partes.push(`Plano: ${f.plano}`);
        if (f.operador) partes.push(`${this.cfg.mode === 'suporte' ? 'Técnico' : 'Atendente'}: ${f.operador}`);
        if (f.status)   partes.push(`Status: ${f.status}`);

        const bar = this.$('filter-info-bar');
        const txt = this.$('filter-info-text');
        if (!bar || !txt) return;
        if (partes.length === 0) { bar.style.display = 'none'; }
        else { bar.style.display = 'block'; txt.innerHTML = '· ' + partes.join(' · '); }
    }

    clearFilters() {
        ['filter-start','filter-end','filter-cidade','filter-processo','filter-plano','filter-operador','filter-status'].forEach(id => {
            const el = this.$(id); if (el) el.value = '';
        });
        this.engine.filters = { dateStart:'', dateEnd:'', cidade:'', processo:'', plano:'', operador:'', status:'' };
        this.engine.applyFilters();
        this.updateFilterInfo();
        this.updateMonthIndicator();
        this.renderAll();
    }

    renderAll() {
        this.renderPulse();
        this.renderKPIs();
        this.renderInsights();
        if (this._chartsTimer) clearTimeout(this._chartsTimer);
        this._chartsTimer = setTimeout(() => this.renderCharts(), 16);
    }

    /* ─── PULSO ─── */
    renderPulse() {
        const data = this.engine.filtered;
        const total = data.length;

        const slaOk    = data.filter(d => d.slaCumprido === 'Dentro do SLA').length;
        const slaFora  = data.filter(d => d.slaCumprido === 'Fora do SLA').length;
        const slaAval  = slaOk + slaFora;
        const pctSla   = slaAval ? (slaOk / slaAval) * 100 : 0;

        const posOk    = data.filter(d => d.pos === 'COM RETORNO').length;
        const posNeg   = data.filter(d => d.pos === 'SEM RETORNO').length;
        const posAval  = posOk + posNeg;
        const pctPos   = posAval ? (posOk / posAval) * 100 : 0;

        const tempos   = data.map(d => d.tempoMinutos).filter(t => t != null && t > 0).sort((a,b)=>a-b);
        const mediana  = tempos.length ? tempos[Math.floor(tempos.length / 2)] : 0;

        // ── Comparação vs mês anterior — MESMO PERÍODO/RECORTE ──
        // A comparação usa o MESMO intervalo de dias no mês anterior:
        //   filtro 01/07→03/07 é comparado com 01/06→03/06 (mesmos 3 primeiros dias)
        //   filtro 15/06→20/06 é comparado com 15/05→20/05
        // Regras:
        //   1. Se o dia final não existe no mês anterior (ex: 31/03 → fevereiro só vai até 28/29),
        //      usa o último dia do mês anterior como fim.
        //   2. Se o filtro está vazio ou incompleto, não mostra comparação.
        //   3. Se o intervalo equivalente do mês anterior está vazio (sem dados), não mostra.
        let inicioAtual = null, fimAtual = null;
        let inicioAnt   = null, fimAnt   = null;
        if (this.engine.filters.dateStart && this.engine.filters.dateEnd) {
            const [yA, mA, dA] = this.engine.filters.dateStart.split('-').map(Number);
            const [yB, mB, dB] = this.engine.filters.dateEnd.split('-').map(Number);
            inicioAtual = new Date(yA, mA - 1, dA, 0, 0, 0, 0);
            fimAtual    = new Date(yB, mB - 1, dB, 23, 59, 59, 999);

            // Mês anterior — considera o mês do INÍCIO do filtro como referência
            const prevInicio = new Date(yA, mA - 2, 1);  // primeiro dia do mês anterior
            const prevMesAno = prevInicio.getFullYear();
            const prevMesMes = prevInicio.getMonth();
            const ultimoDiaPrevMes = new Date(prevMesAno, prevMesMes + 1, 0).getDate();

            // Aplica o mesmo dia de início, mas trata caso o dia não exista no mês anterior
            const diaIni = Math.min(dA, ultimoDiaPrevMes);
            const diaFim = Math.min(dB, ultimoDiaPrevMes);
            inicioAnt = new Date(prevMesAno, prevMesMes, diaIni, 0, 0, 0, 0);
            fimAnt    = new Date(prevMesAno, prevMesMes, diaFim, 23, 59, 59, 999);
        }

        let comparacao = { total:null, sla:null, pos:null, tempo:null };
        if (inicioAtual && fimAtual && inicioAnt && fimAnt) {
            const fAtual = this.engine.data.filter(d => d.data && d.data >= inicioAtual && d.data <= fimAtual);
            const fAnt   = this.engine.data.filter(d => d.data && d.data >= inicioAnt   && d.data <= fimAnt);

            // Se o mês anterior está vazio, não mostra "vs mês anterior" (evita 100% falso)
            comparacao.total = fAnt.length > 0
                ? { atual: fAtual.length, anterior: fAnt.length }
                : null;

            const sOkA = fAtual.filter(d => d.slaCumprido === 'Dentro do SLA').length;
            const sFoA = fAtual.filter(d => d.slaCumprido === 'Fora do SLA').length;
            const sAA = sOkA + sFoA;
            const pctA = sAA ? (sOkA/sAA*100) : null;

            const sOkB = fAnt.filter(d => d.slaCumprido === 'Dentro do SLA').length;
            const sFoB = fAnt.filter(d => d.slaCumprido === 'Fora do SLA').length;
            const sAB = sOkB + sFoB;
            const pctB = sAB ? (sOkB/sAB*100) : null;

            comparacao.sla = { atual: pctA, anterior: pctB };

            const pOkA = fAtual.filter(d => d.pos === 'COM RETORNO').length;
            const pNeA = fAtual.filter(d => d.pos === 'SEM RETORNO').length;
            const pAA = pOkA + pNeA;
            const pAtA = pAA ? (pOkA/pAA*100) : null;

            const pOkB = fAnt.filter(d => d.pos === 'COM RETORNO').length;
            const pNeB = fAnt.filter(d => d.pos === 'SEM RETORNO').length;
            const pAB = pOkB + pNeB;
            const pAtB = pAB ? (pOkB/pAB*100) : null;

            comparacao.pos = { atual: pAtA, anterior: pAtB };

            const tA = fAtual.map(d => d.tempoMinutos).filter(t => t != null && t > 0).sort((a,b)=>a-b);
            const medA = tA.length ? tA[Math.floor(tA.length/2)] : null;
            const tB = fAnt.map(d => d.tempoMinutos).filter(t => t != null && t > 0).sort((a,b)=>a-b);
            const medB = tB.length ? tB[Math.floor(tB.length/2)] : null;

            comparacao.tempo = { atual: medA, anterior: medB };
        }

        const compTxt = (atual, anterior, modo='alto', formatter=null) => {
            if (atual == null || anterior == null) return '';
            const diff = atual - anterior;
            const diffPct = anterior !== 0 ? (diff/anterior*100) : 0;
            const arrow  = Math.abs(diffPct) < 1 ? '→' : (diff > 0 ? '↑' : '↓');
            const isGood = modo === 'alto' ? diff >= 0 : diff <= 0;
            const cor = Math.abs(diffPct) < 1 ? '#94A3B8' : (isGood ? '#34D399' : '#F87171');
            const formatted = formatter ? formatter(Math.abs(diff)) : Math.abs(diffPct).toFixed(0) + '%';
            return `<span style="color:${cor};font-weight:600;">${arrow} ${formatted} vs mês anterior</span>`;
        };

        const status = (val, bench, modo='alto') => {
            if (modo === 'baixo') {
                if (val < bench.excelente) return { label:'EXCELENTE', cor:'#34D399' };
                if (val < bench.bom)        return { label:'BOM',       cor:'#FBBF24' };
                return { label:'ATENÇÃO', cor:'#F87171' };
            }
            if (val >= bench.excelente) return { label:'EXCELENTE', cor:'#34D399' };
            if (val >= bench.bom)       return { label:'BOM',       cor:'#FBBF24' };
            return { label:'ATENÇÃO', cor:'#F87171' };
        };

        const sSla   = status(pctSla,  BENCHMARKS.sla);
        const sPos   = status(pctPos,  BENCHMARKS.pos);
        const sTempo = status(mediana, BENCHMARKS.tempo, 'baixo');

        // Cálculo dias úteis
        let mesRefAno, mesRefMes;
        if (this.engine.filters.dateStart) {
            const [y, m] = this.engine.filters.dateStart.split('-').map(Number);
            mesRefAno = y;
            mesRefMes = m - 1;
        } else {
            const hj = new Date();
            mesRefAno = hj.getFullYear();
            mesRefMes = hj.getMonth();
        }

        const agora = new Date();
        const mesmoMes = mesRefAno === agora.getFullYear() && mesRefMes === agora.getMonth();
        const inicioMes = new Date(mesRefAno, mesRefMes, 1);
        const fimMes    = new Date(mesRefAno, mesRefMes + 1, 0);
        const dataReferencia = mesmoMes ? agora : fimMes;

        const diasUteisTrabalhados = holidaysEngine.countBusinessDays(inicioMes, dataReferencia);
        const diasUteisMes         = holidaysEngine.countBusinessDays(inicioMes, fimMes);
        const diasRestantes        = Math.max(0, diasUteisMes - diasUteisTrabalhados);
        const pctTranscorrido      = diasUteisMes > 0 ? (diasUteisTrabalhados / diasUteisMes) * 100 : 0;

        const nomesMeses = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
        const mesNomeShort = `${nomesMeses[mesRefMes]}/${mesRefAno}`.toLowerCase();

        const cards = [
            {
                emoji:'📅', label:'Dias Úteis',
                value: `${diasUteisTrabalhados} de ${diasUteisMes}`,
                status: '', statusColor: '',
                sub: diasRestantes === 0 ? 'último dia útil' : `${diasRestantes} dia${diasRestantes!==1?'s':''} restante${diasRestantes!==1?'s':''}`,
                cor: '#60A5FA'
            },
            {
                emoji:'🕐', label:'% Mês Transcorrido',
                value: `${pctTranscorrido.toFixed(1).replace('.',',')}%`,
                status: '', statusColor: '',
                sub: `${mesNomeShort} (mês útil)`,
                cor: '#818CF8'
            },
            {
                emoji: this.cfg.pulseLabels.volume.split(' ')[0],
                label: this.cfg.pulseLabels.volume.substring(this.cfg.pulseLabels.volume.indexOf(' ')+1),
                value: total,
                status: '', statusColor: '',
                sub: comparacao.total ? compTxt(comparacao.total.atual, comparacao.total.anterior, 'baixo') : `${total} ${total!==1 ? this.cfg.chamadoPlural : this.cfg.chamadoSingular}`,
                cor: '#2DD4BF'
            },
            {
                emoji:'🚦', label:'SLA Atingido',
                value: slaAval ? pctSla.toFixed(1).replace('.',',') + '%' : '—',
                status: slaAval ? sSla.label : '',
                statusColor: sSla.cor,
                sub: comparacao.sla && comparacao.sla.atual != null && comparacao.sla.anterior != null
                    ? compTxt(comparacao.sla.atual, comparacao.sla.anterior, 'alto', diff => diff.toFixed(1).replace('.',',') + 'pp')
                    : (slaAval ? `${slaOk} de ${slaAval} avaliados` : 'sem avaliação'),
                cor: slaAval ? sSla.cor : '#94A3B8',
                valueColor: slaAval ? sSla.cor : '#94A3B8'
            },
            {
                emoji:'🔁', label:'Retorno do Cliente (PÓS)',
                value: posAval ? pctPos.toFixed(1).replace('.',',') + '%' : '—',
                status: posAval ? sPos.label : '',
                statusColor: sPos.cor,
                sub: comparacao.pos && comparacao.pos.atual != null && comparacao.pos.anterior != null
                    ? compTxt(comparacao.pos.atual, comparacao.pos.anterior, 'alto', diff => diff.toFixed(1).replace('.',',') + 'pp')
                    : (posAval ? `${posOk} com retorno de ${posAval}` : 'sem avaliação'),
                cor: posAval ? sPos.cor : '#94A3B8',
                valueColor: posAval ? sPos.cor : '#94A3B8'
            },
            {
                emoji: this.cfg.pulseLabels.tempo.split(' ')[0],
                label: this.cfg.pulseLabels.tempo.substring(this.cfg.pulseLabels.tempo.indexOf(' ')+1),
                value: this.fmtTempo(mediana),
                status: tempos.length ? sTempo.label : '',
                statusColor: sTempo.cor,
                sub: comparacao.tempo && comparacao.tempo.atual != null && comparacao.tempo.anterior != null
                    ? compTxt(comparacao.tempo.atual, comparacao.tempo.anterior, 'baixo', diff => this.fmtTempo(diff))
                    : (tempos.length ? `mediana de ${tempos.length} ${tempos.length!==1 ? this.cfg.chamadoPlural : this.cfg.chamadoSingular}` : 'sem dados'),
                cor: tempos.length ? sTempo.cor : '#94A3B8',
                valueColor: tempos.length ? sTempo.cor : '#94A3B8'
            }
        ];

        this.$('main-pulse').innerHTML = cards.map(c => `
            <div class="main-pulse-card" style="--pulse-accent:${c.cor}">
                <div class="main-pulse-label">${c.emoji} ${c.label}</div>
                <div class="main-pulse-value"${c.valueColor ? ` style="color:${c.valueColor}"` : ''}>${c.value}</div>
                ${c.status ? `<div class="main-pulse-status" style="color:${c.statusColor}">${c.status}</div>` : ''}
                <div class="main-pulse-sub">${c.sub}</div>
            </div>
        `).join('');
    }

    /* ─── KPIs ─── */
    renderKPIs() {
        const data = this.engine.filtered;
        const total = data.length;

        // Top motivo
        const motivos = {};
        data.forEach(d => { if (d.processo) motivos[d.processo] = (motivos[d.processo]||0) + 1; });
        const topMot = Object.entries(motivos).sort((a,b) => b[1] - a[1])[0] || ['—', 0];

        // Top cidade
        const cidades = {};
        data.forEach(d => { if (d.cidade) cidades[d.cidade] = (cidades[d.cidade]||0) + 1; });
        const topCid = Object.entries(cidades).sort((a,b) => b[1] - a[1])[0] || ['—', 0];

        // Top plano
        const planos = {};
        data.forEach(d => { if (d.plano) planos[d.plano] = (planos[d.plano]||0) + 1; });
        const topPlano = Object.entries(planos).sort((a,b) => b[1] - a[1])[0] || ['—', 0];

        // Pico horário
        const horas = {};
        data.forEach(d => { if (d.abertura) horas[d.abertura.getHours()] = (horas[d.abertura.getHours()]||0) + 1; });
        const topHora = Object.entries(horas).sort((a,b) => b[1] - a[1])[0];
        const horaTxt = topHora ? `${String(topHora[0]).padStart(2,'0')}h–${String(+topHora[0]+1).padStart(2,'0')}h` : '—';
        const horaQtd = topHora ? topHora[1] : 0;

        this.$('kpi-top-motivo').innerText = topMot[0];
        this.$('kpi-top-motivo-sub').innerText = `${topMot[1]} ${topMot[1] !== 1 ? this.cfg.chamadoPlural : this.cfg.chamadoSingular}`;

        this.$('kpi-top-cidade').innerText = topCid[0];
        this.$('kpi-top-cidade-sub').innerText = `${topCid[1]} ${topCid[1] !== 1 ? this.cfg.chamadoPlural : this.cfg.chamadoSingular}`;

        this.$('kpi-top-plano').innerText = topPlano[0];
        this.$('kpi-top-plano-sub').innerText = `${topPlano[1]} ${topPlano[1] !== 1 ? this.cfg.chamadoPlural : this.cfg.chamadoSingular}`;

        this.$('kpi-pico').innerText = horaTxt;
        this.$('kpi-pico-sub').innerText = horaQtd ? `${horaQtd} aberturas neste horário` : 'sem dados';

        // KPIs específicos de Atendimento
        if (this.cfg.extraKpis.includes('estouro')) {
            const forasSla = data.filter(d => d.slaCumprido === 'Fora do SLA' && d.tempoMinutos != null && d.slaContratadoMin > 0);
            let estouroTxt = '—', estouroSub = 'nenhum caso "Fora"';
            if (forasSla.length) {
                const estouros = forasSla.map(d => d.tempoMinutos - d.slaContratadoMin).filter(x => x > 0);
                if (estouros.length) {
                    const medEstouro = estouros.reduce((a,b) => a+b, 0) / estouros.length;
                    estouroTxt = this.fmtTempo(medEstouro);
                    estouroSub = `média entre ${forasSla.length} caso${forasSla.length !== 1 ? 's' : ''}`;
                }
            }
            this.$('kpi-estouro').innerText = estouroTxt;
            this.$('kpi-estouro-sub').innerText = estouroSub;
        }

        if (this.cfg.extraKpis.includes('pendentes')) {
            const abertos = data.filter(d => /^ABERTO$/i.test(d.status)).length;
            const andamento = data.filter(d => /^EM ANDAMENTO$/i.test(d.status)).length;
            const reabertos = data.filter(d => /^REABERTO$/i.test(d.status)).length;
            const pendentes = abertos + andamento + reabertos;

            this.$('kpi-pendentes').innerText = pendentes;
            if (pendentes === 0 && data.filter(d => d.status).length === 0) {
                this.$('kpi-pendentes-sub').innerText = 'sem status preenchido';
            } else {
                const partes = [];
                if (abertos)   partes.push(`${abertos} Aberto${abertos!==1?'s':''}`);
                if (andamento) partes.push(`${andamento} Em Andamento`);
                if (reabertos) partes.push(`${reabertos} Reaberto${reabertos!==1?'s':''}`);
                this.$('kpi-pendentes-sub').innerText = partes.length ? partes.join(' · ') : 'tudo resolvido ✓';
            }
        }

        // KPIs específicos de Suporte
        if (this.cfg.extraKpis.includes('reabertura')) {
            const reabertos = data.filter(d => /REABERTO/i.test(d.status)).length;
            const comStatus = data.filter(d => d.status).length;
            const pct = comStatus ? (reabertos / comStatus * 100) : 0;
            this.$('kpi-reabertura').innerText = comStatus ? `${pct.toFixed(1).replace('.',',')}%` : '—';
            this.$('kpi-reabertura-sub').innerText = comStatus
                ? `${reabertos} de ${comStatus} chamado${comStatus!==1?'s':''}`
                : 'sem status preenchido';
        }

        if (this.cfg.extraKpis.includes('reincidencia')) {
            // Agrupa por CNPJ (ou por nome se CNPJ vazio) e conta clientes com >1 chamado
            const porCliente = {};
            data.forEach(d => {
                const key = (d.cnpj && d.cnpj.trim()) || (d.nome && d.nome.trim());
                if (!key) return;
                porCliente[key] = (porCliente[key] || 0) + 1;
            });
            const totalClientes = Object.keys(porCliente).length;
            const reincidentes = Object.values(porCliente).filter(v => v > 1).length;
            const pct = totalClientes ? (reincidentes / totalClientes * 100) : 0;
            this.$('kpi-reincidencia').innerText = totalClientes ? `${pct.toFixed(1).replace('.',',')}%` : '—';
            this.$('kpi-reincidencia-sub').innerText = totalClientes
                ? `${reincidentes} de ${totalClientes} cliente${totalClientes!==1?'s':''}`
                : 'sem dados';
        }
    }

    /* ─── CHARTS ─── */
    renderCharts() {
        const data = this.engine.filtered;
        const self = this;

        // 1. Evolução Diária
        const porDia = {};
        const idsPorDia = {};
        data.forEach(d => {
            if (!d.data) return;
            const key = d.dataStr;
            porDia[key] = (porDia[key]||0) + 1;
            (idsPorDia[key] = idsPorDia[key] || []).push(d);
        });
        const dias = Object.keys(porDia).sort((a,b) => {
            const [da,ma,ya] = a.split('/').map(Number);
            const [db,mb,yb] = b.split('/').map(Number);
            return new Date(ya,ma-1,da) - new Date(yb,mb-1,db);
        });

        this.chart('chart-evolucao', {
            chart: {
                type:'area', height:280, toolbar:{show:false},
                foreColor:'#94A3B8', background:'transparent',
                animations:{enabled:false},
                events: {
                    dataPointSelection: (e,c,cfg) => self.openModal('evolucao', dias[cfg.dataPointIndex], idsPorDia[dias[cfg.dataPointIndex]]),
                    markerClick:         (e,c,cfg) => self.openModal('evolucao', dias[cfg.dataPointIndex], idsPorDia[dias[cfg.dataPointIndex]]),
                    click:               (e,c,cfg) => {
                        if (cfg && typeof cfg.dataPointIndex === 'number' && cfg.dataPointIndex >= 0) {
                            self.openModal('evolucao', dias[cfg.dataPointIndex], idsPorDia[dias[cfg.dataPointIndex]]);
                        }
                    }
                }
            },
            series: [{ name: this.cfg.chamadoPlural.charAt(0).toUpperCase() + this.cfg.chamadoPlural.slice(1), data: dias.map(d => porDia[d]) }],
            xaxis: { categories: dias, labels:{ style:{colors:'#94A3B8',fontSize:'11px'} } },
            yaxis: { labels:{ style:{colors:'#94A3B8',fontSize:'11px'} } },
            colors: [this.cfg.mode === 'suporte' ? '#F87171' : '#60A5FA'],
            stroke: { curve:'smooth', width:2.5 },
            fill:   { type:'gradient', gradient:{shadeIntensity:1, opacityFrom:0.3, opacityTo:0} },
            markers: { size:6, colors:[this.cfg.mode === 'suporte' ? '#F87171' : '#60A5FA'], strokeColors:'#1E293B', strokeWidth:2, fillOpacity:1, shape:'circle',
                       hover:{size:10, sizeOffset:4} },
            grid: { show: false },
            dataLabels: { enabled:false },
            tooltip: {
                theme:'dark',
                custom: ({dataPointIndex}) => {
                    const k = dias[dataPointIndex]; if (!k) return '';
                    return `<div style="padding:10px;background:#1E293B;border:1px solid #334155;border-radius:8px;">
                        <div style="font-size:11px;color:#94A3B8;margin-bottom:4px;">${k}</div>
                        <div style="font-weight:700;color:#fff;">${porDia[k]} ${porDia[k]!==1 ? self.cfg.chamadoPlural : self.cfg.chamadoSingular}</div>
                        <div style="font-size:10px;color:#FBBF24;margin-top:6px;font-style:italic;">👆 Clique para ver lista</div>
                    </div>`;
                }
            }
        });

        // 2. SLA Donut
        const slaOkArr   = data.filter(d => d.slaCumprido === 'Dentro do SLA');
        const slaForaArr = data.filter(d => d.slaCumprido === 'Fora do SLA');
        const slaOk = slaOkArr.length, slaFora = slaForaArr.length;
        const slaTotal = slaOk + slaFora;
        const slaPct = slaTotal ? (slaOk/slaTotal*100).toFixed(1).replace('.',',') : '0';
        this.chart('chart-sla', {
            chart: {
                type:'donut', height:280, foreColor:'#94A3B8', background:'transparent',
                events: {
                    dataPointSelection: (e,c,cfg) => {
                        const arr = cfg.dataPointIndex === 0 ? slaOkArr : slaForaArr;
                        const label = cfg.dataPointIndex === 0 ? 'Dentro do SLA' : 'Fora do SLA';
                        self.openModal('sla', label, arr);
                    }
                }
            },
            series: [slaOk, slaFora],
            labels: ['Dentro do SLA', 'Fora do SLA'],
            colors: ['#34D399', '#F87171'],
            legend: { position:'bottom', fontSize:'12px', fontWeight:600, labels:{colors:'#94A3B8'}, markers:{width:10,height:10,radius:3} },
            dataLabels: { enabled:true, style:{fontSize:'14px',fontWeight:700,colors:['#fff']},
                          formatter: (val) => Math.round(val) + '%' },
            stroke: { width: 0 },
            plotOptions: {
                pie: {
                    donut: {
                        size:'70%',
                        labels: {
                            show:true,
                            name: { show:true, fontSize:'13px', color:'#94A3B8', fontWeight:600 },
                            value: { show:true, fontSize:'24px', color:'#fff', fontWeight:700, offsetY:8, formatter: v => v },
                            total: {
                                show:true, label:'SLA Atingido', color:'#94A3B8',
                                fontSize:'12px', fontWeight:600,
                                formatter: () => slaPct + '%'
                            }
                        }
                    }
                }
            },
            tooltip: { theme:'dark', y:{ formatter: v => `${v} ${v!==1 ? self.cfg.chamadoPlural : self.cfg.chamadoSingular}` } }
        });

        // 3. Top Motivos
        const motivos = {};
        const idsPorMotivo = {};
        data.forEach(d => {
            if (!d.processo) return;
            motivos[d.processo] = (motivos[d.processo]||0) + 1;
            (idsPorMotivo[d.processo] = idsPorMotivo[d.processo] || []).push(d);
        });
        const motivosSorted = Object.entries(motivos).sort((a,b) => b[1]-a[1]);
        const motivosKeys = motivosSorted.map(m => m[0]);
        const motivosWidth = Math.max(100, motivosSorted.length * 80);
        const motEl = this.$('chart-motivos');
        if (motEl) motEl.style.minWidth = motivosWidth + 'px';

        this.chart('chart-motivos', {
            chart: {
                type:'bar', height:320, toolbar:{show:false}, foreColor:'#94A3B8', background:'transparent',
                events: {
                    dataPointSelection: (e,c,cfg) => self.openModal('motivo', motivosKeys[cfg.dataPointIndex], idsPorMotivo[motivosKeys[cfg.dataPointIndex]])
                }
            },
            series: [{ name: self.cfg.chamadoPlural, data: motivosSorted.map(m => m[1]) }],
            xaxis: {
                categories: motivosKeys,
                labels:{ style:{colors:'#94A3B8',fontSize:'10px'}, rotate:-30, hideOverlappingLabels:false, trim:false, maxHeight:80 }
            },
            yaxis: { labels:{ style:{colors:'#94A3B8',fontSize:'11px'} } },
            plotOptions: { bar:{ columnWidth:'62%', borderRadius:6, distributed:true, dataLabels:{position:'top'} } },
            colors: ['#818CF8','#60A5FA','#2DD4BF','#34D399','#FBBF24','#F87171','#A78BFA','#FB7185','#FCD34D','#22D3EE','#4ADE80','#F472B6'],
            dataLabels: { enabled:true, style:{fontSize:'11px',colors:['#94A3B8'],fontWeight:600}, offsetY:-22, formatter: val => val },
            grid: { show: false },
            legend: { show:false },
            tooltip: {
                theme:'dark',
                custom: ({dataPointIndex}) => {
                    const k = motivosKeys[dataPointIndex]; if (!k) return '';
                    return `<div style="padding:10px;background:#1E293B;border:1px solid #334155;border-radius:8px;">
                        <div style="font-size:11px;color:#94A3B8;margin-bottom:4px;">${k}</div>
                        <div style="font-weight:700;color:#fff;">${motivos[k]} ${motivos[k]!==1 ? self.cfg.chamadoPlural : self.cfg.chamadoSingular}</div>
                        <div style="font-size:10px;color:#FBBF24;margin-top:6px;font-style:italic;">👆 Clique para ver lista</div>
                    </div>`;
                }
            }
        });

        // 4. Top Cidades
        const cidades = {};
        const idsPorCidade = {};
        data.forEach(d => {
            if (!d.cidade) return;
            cidades[d.cidade] = (cidades[d.cidade]||0) + 1;
            (idsPorCidade[d.cidade] = idsPorCidade[d.cidade] || []).push(d);
        });
        const cidSorted = Object.entries(cidades).sort((a,b) => b[1]-a[1]);
        const cidKeys = cidSorted.map(c => c[0]);
        const cidWidth = Math.max(100, cidSorted.length * 80);
        const cidEl = this.$('chart-cidades');
        if (cidEl) cidEl.style.minWidth = cidWidth + 'px';

        this.chart('chart-cidades', {
            chart: {
                type:'bar', height:320, toolbar:{show:false}, foreColor:'#94A3B8', background:'transparent',
                events: {
                    dataPointSelection: (e,c,cfg) => self.openModal('cidade', cidKeys[cfg.dataPointIndex], idsPorCidade[cidKeys[cfg.dataPointIndex]])
                }
            },
            series: [{ name: self.cfg.chamadoPlural, data: cidSorted.map(c => c[1]) }],
            xaxis: {
                categories: cidKeys,
                labels:{ style:{colors:'#94A3B8',fontSize:'10px'}, rotate:-30, hideOverlappingLabels:false, trim:false, maxHeight:80 }
            },
            yaxis: { labels:{ style:{colors:'#94A3B8',fontSize:'11px'} } },
            plotOptions: { bar:{ columnWidth:'62%', borderRadius:6, distributed:true, dataLabels:{position:'top'} } },
            colors: ['#60A5FA','#2DD4BF','#34D399','#818CF8','#FBBF24','#F87171','#A78BFA','#FB7185','#FCD34D','#22D3EE','#4ADE80','#F472B6'],
            dataLabels: { enabled:true, style:{fontSize:'11px',colors:['#94A3B8'],fontWeight:600}, offsetY:-22, formatter: val => val },
            grid: { show: false },
            legend: { show:false },
            tooltip: {
                theme:'dark',
                custom: ({dataPointIndex}) => {
                    const k = cidKeys[dataPointIndex]; if (!k) return '';
                    return `<div style="padding:10px;background:#1E293B;border:1px solid #334155;border-radius:8px;">
                        <div style="font-size:11px;color:#94A3B8;margin-bottom:4px;">${k}</div>
                        <div style="font-weight:700;color:#fff;">${cidades[k]} ${cidades[k]!==1 ? self.cfg.chamadoPlural : self.cfg.chamadoSingular}</div>
                        <div style="font-size:10px;color:#FBBF24;margin-top:6px;font-style:italic;">👆 Clique para ver lista</div>
                    </div>`;
                }
            }
        });

        // 5. Distribuição por Hora
        const horasMap = Array(24).fill(0).map(() => []);
        data.forEach(d => { if (d.abertura) horasMap[d.abertura.getHours()].push(d); });
        const horas = horasMap.map(arr => arr.length);
        const horasLabels = [...Array(24).keys()].map(h => String(h).padStart(2,'0') + 'h');

        this.chart('chart-horas', {
            chart: {
                type:'area', height:300, toolbar:{show:false}, foreColor:'#94A3B8', background:'transparent',
                animations:{enabled:false},
                events: {
                    dataPointSelection: (e,c,cfg) => self.openModal('hora', `${String(cfg.dataPointIndex).padStart(2,'0')}h`, horasMap[cfg.dataPointIndex]),
                    markerClick:         (e,c,cfg) => self.openModal('hora', `${String(cfg.dataPointIndex).padStart(2,'0')}h`, horasMap[cfg.dataPointIndex]),
                    click:               (e,c,cfg) => {
                        if (cfg && typeof cfg.dataPointIndex === 'number' && cfg.dataPointIndex >= 0) {
                            self.openModal('hora', `${String(cfg.dataPointIndex).padStart(2,'0')}h`, horasMap[cfg.dataPointIndex]);
                        }
                    }
                }
            },
            series: [{ name:'Aberturas', data: horas }],
            xaxis: { categories: horasLabels, labels:{ style:{colors:'#94A3B8',fontSize:'11px'} } },
            yaxis: { labels:{ style:{colors:'#94A3B8',fontSize:'11px'} } },
            colors: ['#2DD4BF'],
            stroke: { curve:'smooth', width:2.5 },
            fill:   { type:'gradient', gradient:{shadeIntensity:1, opacityFrom:0.35, opacityTo:0} },
            markers: { size:6, colors:['#2DD4BF'], strokeColors:'#1E293B', strokeWidth:2, fillOpacity:1, shape:'circle',
                       hover:{size:10, sizeOffset:4} },
            grid: { show: false },
            dataLabels: { enabled:false },
            tooltip: {
                theme:'dark',
                custom: ({dataPointIndex}) => {
                    const k = horasLabels[dataPointIndex]; if (!k) return '';
                    return `<div style="padding:10px;background:#1E293B;border:1px solid #334155;border-radius:8px;">
                        <div style="font-size:11px;color:#94A3B8;margin-bottom:4px;">Horário: ${k}</div>
                        <div style="font-weight:700;color:#fff;">${horas[dataPointIndex]} abertura${horas[dataPointIndex]!==1?'s':''}</div>
                        <div style="font-size:10px;color:#FBBF24;margin-top:6px;font-style:italic;">👆 Clique para ver lista</div>
                    </div>`;
                }
            }
        });

        // 6. PÓS Donut
        const posOkArr  = data.filter(d => d.pos === 'COM RETORNO');
        const posNegArr = data.filter(d => d.pos === 'SEM RETORNO');
        const posOk = posOkArr.length, posNeg = posNegArr.length;

            chart: {
                type:'donut', height:300, foreColor:'#94A3B8', background:'transparent',

                    dataPointSelection: (e,c,cfg) => {
